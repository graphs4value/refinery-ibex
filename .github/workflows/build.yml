name: Build
on:
  push:
    branches:
      - '**'
      - '!gh-pages'
  pull_request:
    types: [opened, synchronize, reopened]
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true
env:
  RUNNER_UBUNTU: &runner-ubuntu ubuntu-26.04
  RUNNER_UBUNTU_ARM: &runner-ubuntu-arm ubuntu-26.04-arm
  RUNNER_WINDOWS: &runner-windows windows-2025
  RUNNER_MACOS: &runner-macos macos-26
jobs:
  ibex-version:
    name: Determine IBEX version
    runs-on: *runner-ubuntu
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Read version from gradle.properties
        id: get-version
        run: |
          version=$(grep -oP '^version=\K.*' gradle.properties)
          echo "version=$version" >> "$GITHUB_OUTPUT"
  ibex:
    name: Build IBEX binaries
    needs: ibex-version
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: *runner-ubuntu
            artifact-suffix: linux-x86-64
            interval-lib: gaol
          - name: *runner-ubuntu-arm
            artifact-suffix: linux-aarch64
            interval-lib: filib
          - name: *runner-windows
            artifact-suffix: win32-x86-64
            interval-lib: filib
          - name: *runner-macos
            artifact-suffix: darwin-aarch64
            interval-lib: gaol
    runs-on: ${{ matrix.os.name }}
    steps:
      - name: Checkout IBEX
        uses: actions/checkout@v6
        with:
          repository: ibex-team/ibex-lib
          ref: ibex-${{ needs.ibex-version.outputs.version }}
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin
      - name: Install flex and bison
        uses: crazy-max/ghaction-chocolatey@dfdcf5bba9c0a16358a21c13a06ec5c89024b3ac
        if: ${{ startsWith(matrix.os.name, 'windows-') }}
        with:
          args: install winflexbison
      - name: CMake build
        shell: bash
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DINTERVAL_LIB=${{ matrix.os.interval-lib }} -DBUILD_SHARED_LIBS=ON -DBUILD_JAVA_INTERFACE=ON -DJAVA_PACKAGE=tools.refinery.ibex ..
          cmake --build . --config Release
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ibex-${{ matrix.os.artifact-suffix }}
          path: build
          retention-days: 5  # Artifact internal to the workflow
  maven:
    name: Build Maven artifacts
    needs: ibex
    strategy:
      fail-fast: false
      matrix:
        os:
          - *runner-ubuntu
          - *runner-ubuntu-arm
          - *runner-windows
          - *runner-macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin
      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
          key: ${{ matrix.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ matrix.os }}-gradle
      - name: Download IBEX artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: ibex-*
      - name: Copy artifacts to source directories
        shell: bash
        run: |
          mkdir -p subprojects/solver-linux-x86-64/src/main/resources/ibex-linux-x86-64
          cp artifacts/ibex-linux-x86-64/{src/libibex.so,src/java/libibex-java.so,interval_lib_wrapper/gaol/gaol-*-build/libgaol.so,interval_lib_wrapper/gaol/mathlib-*-build/libultim.so} subprojects/solver-linux-x86-64/src/main/resources/ibex-linux-x86-64
          grep -v loadLibrary artifacts/ibex-linux-x86-64/src/java/Ibex.java > subprojects/solver/src/main/java/tools/refinery/ibex/Ibex.java
          mkdir -p subprojects/solver-linux-aarch64/src/main/resources/ibex-linux-aarch64
          cp artifacts/ibex-linux-aarch64/{src/libibex.so,src/java/libibex-java.so,interval_lib_wrapper/filib/filibsrc-*-build/libprim.so} subprojects/solver-linux-aarch64/src/main/resources/ibex-linux-aarch64
          mkdir -p subprojects/solver-darwin-aarch64/src/main/resources/ibex-darwin-aarch64
          cp artifacts/ibex-darwin-aarch64/{src/libibex.dylib,src/java/libibex-java.dylib,interval_lib_wrapper/gaol/gaol-*-build/libgaol.dylib,interval_lib_wrapper/gaol/mathlib-*-build/libultim.dylib} subprojects/solver-darwin-aarch64/src/main/resources/ibex-darwin-aarch64
          mkdir -p subprojects/solver-win32-x86-64/src/main/resources/ibex-win32-x86-64
          cp artifacts/ibex-win32-x86-64/{src/Release/ibex.dll,src/java/Release/ibex-java.dll} subprojects/solver-win32-x86-64/src/main/resources/ibex-win32-x86-64
      - name: Gradle build
        run: |
          ./gradlew build -Pci --info --stacktrace --max-workers 4 --no-daemon
      - name: Build signed Maven repository
        if: ${{ matrix.os == env.RUNNER_UBUNTU && github.event_name == 'push' && github.repository_owner == 'graphs4value' }}
        env:
          PGP_KEY: ${{ secrets.PGP_KEY }}
          PGP_KEY_ID: ${{ secrets.PGP_KEY_ID }}
          PGP_PASSWORD: ${{ secrets.PGP_PASSWORD }}
        run: |
          ./gradlew mavenRepository -Pci -PforceSign --info --stacktrace --max-workers 4 --no-daemon
      - name: Build unsigned Maven repository
        if: ${{ matrix.os == env.RUNNER_UBUNTU && (github.event_name != 'push' || github.repository_owner != 'graphs4value') }}
        run: |
          ./gradlew mavenRepository -Pci --info --stacktrace --max-workers 4 --no-daemon
      - name: Upload artifacts
        if: ${{ matrix.os == env.RUNNER_UBUNTU }}
        uses: actions/upload-artifact@v7
        with:
          name: maven-repo
          path: build/repo
  clean:
    name: Clean up artifacts
    needs: maven
    if: always()
    runs-on: *runner-ubuntu
    steps:
      - name: Delete IBEX artifacts
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118
        with:
          name: ibex-*
  reuse-check:
    name: REUSE Compliance Check
    runs-on: *runner-ubuntu
    steps:
    - uses: actions/checkout@v6
    - name: REUSE Compliance Check
      uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5
      with:
        args: --include-meson-subprojects lint